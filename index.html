<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>CSG Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" media="screen" href="main.css" />
    <script src="main.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="app__header">
        <nav class="nav">
          <h1 class="nav__title">Post Report App</h1>
          <ul class="nav__list">
            <li class="nav__item">
              <a href="#posts" class="nav__link" data-view="posts">Posts</a>
            </li>
            <li class="nav__item">
              <a href="#reports" class="nav__link" data-view="reports"
                >Reports</a
              >
            </li>
          </ul>
        </nav>
      </header>

      <main class="app__main">
        <!-- Posts View -->
        <section id="posts-view" class="posts-view view--hidden">
          <div class="posts-view__header">
            <h2 class="posts-view__title">Posts</h2>
            <div class="search-controls">
              <input
                type="text"
                id="search-input"
                class="search-controls__input"
                placeholder="Search by title or body..."
              />
              <button id="search-button" class="search-controls__button">
                Search
              </button>
            </div>
          </div>

          <div class="posts-view__content">
            <table class="posts-table" id="posts-table">
              <thead class="posts-table__head">
                <tr class="posts-table__row posts-table__row--header">
                  <th class="posts-table__cell posts-table__cell--header">
                    ID
                  </th>
                  <th class="posts-table__cell posts-table__cell--header">
                    Title
                  </th>
                  <th class="posts-table__cell posts-table__cell--header">
                    Body
                  </th>
                  <th class="posts-table__cell posts-table__cell--header">
                    User ID
                  </th>
                  <th class="posts-table__cell posts-table__cell--header">
                    Actions
                  </th>
                </tr>
              </thead>
              <tbody class="posts-table__body" id="posts-table-body">
                <!-- Posts will be rendered here -->
              </tbody>
            </table>
          </div>
        </section>

        <!-- Reports View -->
        <section id="reports-view" class="reports-view view--hidden">
          <div class="reports-view__header">
            <h2 class="reports-view__title">Reports</h2>
          </div>

          <div class="reports-view__content">
            <div class="reports-summary">
              <h3 class="reports-summary__title">Rerum Count</h3>
              <p class="reports-summary__value" id="rerum-count">0</p>
            </div>

            <div class="reports-table-container">
              <h3 class="reports-table-container__title">Posts per User</h3>
              <table class="reports-table" id="posts-per-user-table">
                <thead class="reports-table__head">
                  <tr class="reports-table__row reports-table__row--header">
                    <th class="reports-table__cell reports-table__cell--header">
                      User ID
                    </th>
                    <th class="reports-table__cell reports-table__cell--header">
                      Post Count
                    </th>
                  </tr>
                </thead>
                <tbody class="reports-table__body" id="posts-per-user-body">
                  <!-- User stats will be rendered here -->
                </tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- Comments Modal -->
    <div id="comments-modal" class="comments-modal comments-modal--hidden">
      <div class="comments-modal__overlay"></div>
      <div class="comments-modal__panel">
        <div class="comments-modal__header">
          <h3 class="comments-modal__title">Comments</h3>
          <button class="comments-modal__close" id="close-modal">
            &times;
          </button>
        </div>
        <div class="comments-modal__content" id="comments-content">
          <!-- Comments will be rendered here -->
        </div>
      </div>
    </div>
  </body>
</html>
